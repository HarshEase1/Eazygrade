name: Deploy backend to production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: backend-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Django backend
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      PYTHON_VERSION: "3.13"
      SERVER_PYTHON_BIN: ${{ vars.BACKEND_SERVER_PYTHON_BIN || 'python3' }}
      DEPLOY_PATH: ${{ vars.BACKEND_DEPLOY_PATH || '~/backend' }}
      SERVICE_NAME: ${{ vars.BACKEND_SERVICE_NAME || 'eazygrade-backend' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install build dependencies
        run: |
          python -m pip install --no-cache-dir --upgrade pip
          python -m pip install --no-cache-dir -r requirements.txt

      - name: Write production env
        env:
          BACKEND_ENV_PRODUCTION: ${{ secrets.BACKEND_ENV_PRODUCTION }}
        run: |
          if [ -n "$BACKEND_ENV_PRODUCTION" ]; then
            printf '%s\n' "$BACKEND_ENV_PRODUCTION" > .env
          fi

      - name: Validate Django project
        run: python manage.py check --deploy

      - name: Package release
        run: |
          tar -czf "$RUNNER_TEMP/backend-release.tar.gz" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='venv' \
            --exclude='.venv' \
            --exclude='db.sqlite3' \
            --exclude='media' \
            .

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.PRODUCTION_SSH_KEY }}" > ~/.ssh/production_key
          chmod 600 ~/.ssh/production_key
          ssh-keyscan -H "${{ secrets.PRODUCTION_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload release archive
        run: |
          scp -i ~/.ssh/production_key \
            "$RUNNER_TEMP/backend-release.tar.gz" \
            "${{ secrets.PRODUCTION_USER }}@${{ secrets.PRODUCTION_HOST }}:/tmp/backend-release-${{ github.sha }}.tar.gz"

      - name: Activate release
        run: |
          ssh -i ~/.ssh/production_key "${{ secrets.PRODUCTION_USER }}@${{ secrets.PRODUCTION_HOST }}" \
            "DEPLOY_PATH='${DEPLOY_PATH}' SERVICE_NAME='${SERVICE_NAME}' RELEASE_ID='${{ github.sha }}' SERVER_PYTHON_BIN='${SERVER_PYTHON_BIN}' bash -s" <<'REMOTE'
          set -euo pipefail

          DEPLOY_PATH="${DEPLOY_PATH/#\~/$HOME}"
          RELEASES_PATH="$DEPLOY_PATH/releases"
          LOGS_PATH="$DEPLOY_PATH/logs"
          RELEASE_PATH="$RELEASES_PATH/$RELEASE_ID"
          ARCHIVE_PATH="/tmp/backend-release-$RELEASE_ID.tar.gz"
          SERVICE_STOPPED=0

          restore_current_service() {
            if [ "$SERVICE_STOPPED" = "1" ]; then
              sudo systemctl start "$SERVICE_NAME" || true
            fi
          }

          trap restore_current_service ERR

          mkdir -p "$RELEASES_PATH"
          mkdir -p "$LOGS_PATH"
          rm -rf "$RELEASE_PATH"
          mkdir -p "$RELEASE_PATH"

          tar -xzf "$ARCHIVE_PATH" -C "$RELEASE_PATH"
          rm -f "$ARCHIVE_PATH"

          sudo systemctl stop "$SERVICE_NAME" || true
          SERVICE_STOPPED=1

          cd "$RELEASE_PATH"
          export PIP_NO_CACHE_DIR=1
          rm -rf "$HOME/.cache/pip" "$RELEASE_PATH/.venv"
          "$SERVER_PYTHON_BIN" -m venv .venv
          . .venv/bin/activate
          python -m pip install --no-cache-dir --upgrade pip
          python -m pip install --no-cache-dir -r requirements.txt
          python manage.py migrate --noinput

          ln -sfn "$RELEASE_PATH" "$DEPLOY_PATH/current-next"
          mv -Tf "$DEPLOY_PATH/current-next" "$DEPLOY_PATH/current"

          sudo systemctl start "$SERVICE_NAME"
          sleep 5
          systemctl is-active --quiet "$SERVICE_NAME"
          SERVICE_STOPPED=0

          cd "$RELEASES_PATH"
          ls -1dt */ | tail -n +4 | xargs -r rm -rf
          REMOTE
